<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="Georgia, serif">
  <defs>
    <style>
      .lbl { font-family: 'Courier New', monospace; font-size: 10px; fill: #999; letter-spacing: 0.12em; text-transform: uppercase; }
      .rule { font-family: 'Courier New', monospace; font-size: 11px; fill: #444; }
      .st { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; }
      /* Logo type — valores exactos del sitio */
      .ln { font-family: 'Fraunces', Georgia, serif; font-size: 40px; font-weight: 500; letter-spacing: -0.02em; }
      .lb { font-family: 'Manrope', Arial, sans-serif; font-size: 25px; font-weight: 700; letter-spacing: -0.01em; }
    </style>
  </defs>

  <!-- HEADER -->
  <text x="40" y="32" class="st" fill="#aaa">NOELIA.BIZ · LOGO KIT · 2026 — Fraunces wght 500 + Manrope 700</text>

  <!-- =====================================================
       ROW 1 — MAIN VARIATIONS
       ===================================================== -->

  <!-- 1. ON WHITE — primary -->
  <rect x="40" y="50" width="240" height="130" rx="8" fill="#FFFFFF" stroke="#e8e8e8" stroke-width="1"/>
  <text y="126" class="ln">
    <tspan x="62" fill="#111111">noelia</tspan><tspan fill="#2132BD">.</tspan><tspan> </tspan>
  </text>
  <rect x="216" y="96" width="50" height="34" rx="4" fill="#EDDF2D"/>
  <text x="241" y="122" text-anchor="middle" class="lb" fill="#111111">biz</text>
  <text x="160" y="170" text-anchor="middle" class="lbl">On White — Primary</text>

  <!-- 2. ON BLACK — dot yellow -->
  <rect x="310" y="50" width="240" height="130" rx="8" fill="#111111"/>
  <text y="126" class="ln">
    <tspan x="332" fill="#FFFFFF">noelia</tspan><tspan fill="#EDDF2D">.</tspan>
  </text>
  <rect x="486" y="96" width="50" height="34" rx="4" fill="#EDDF2D"/>
  <text x="511" y="122" text-anchor="middle" class="lb" fill="#111111">biz</text>
  <text x="430" y="170" text-anchor="middle" class="lbl" fill="#555">On Black — dot Yellow</text>

  <!-- 3. ON BLUE — dot yellow -->
  <rect x="580" y="50" width="240" height="130" rx="8" fill="#2132BD"/>
  <text y="126" class="ln">
    <tspan x="602" fill="#FFFFFF">noelia</tspan><tspan fill="#EDDF2D">.</tspan>
  </text>
  <rect x="756" y="96" width="50" height="34" rx="4" fill="#EDDF2D"/>
  <text x="781" y="122" text-anchor="middle" class="lb" fill="#111111">biz</text>
  <text x="700" y="170" text-anchor="middle" class="lbl" fill="rgba(255,255,255,0.4)">On Blue — dot Yellow</text>

  <!-- =====================================================
       ROW 2 — SPECIAL VARIATIONS
       ===================================================== -->

  <!-- 4. ON YELLOW -->
  <rect x="40" y="205" width="240" height="130" rx="8" fill="#EDDF2D"/>
  <text y="281" class="ln">
    <tspan x="62" fill="#111111">noelia</tspan><tspan fill="#2132BD">.</tspan>
  </text>
  <rect x="216" y="251" width="50" height="34" rx="4" fill="#111111"/>
  <text x="241" y="277" text-anchor="middle" class="lb" fill="#EDDF2D">biz</text>
  <text x="160" y="323" text-anchor="middle" class="lbl">On Yellow</text>

  <!-- 5. MONOCHROME -->
  <rect x="310" y="205" width="240" height="130" rx="8" fill="#FFFFFF" stroke="#e8e8e8" stroke-width="1"/>
  <text y="281" class="ln">
    <tspan x="332" fill="#111111">noelia</tspan><tspan fill="#111111">.</tspan>
  </text>
  <rect x="486" y="251" width="50" height="34" rx="4" fill="#111111"/>
  <text x="511" y="277" text-anchor="middle" class="lb" fill="#FFFFFF">biz</text>
  <text x="430" y="323" text-anchor="middle" class="lbl">Monochrome — print</text>

  <!-- 6. FAVICON noel·IA·biz -->
  <rect x="580" y="205" width="240" height="130" rx="8" fill="#FFFFFF" stroke="#e8e8e8" stroke-width="1"/>
  <!-- 72px -->
  <rect x="615" y="218" width="72" height="72" rx="10" fill="#111111"/>
  <text x="651" y="246" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-size="16px" font-weight="500" fill="#FFFFFF" letter-spacing="-0.02em">noel</text>
  <text x="645" y="265" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-size="16px" font-weight="500" fill="#FFFFFF" letter-spacing="-0.02em">ia</text><text x="657" y="265" font-family="Georgia,serif" font-size="16px" fill="#EDDF2D">.</text>
  <rect x="630" y="270" width="34" height="14" rx="3" fill="#EDDF2D"/>
  <text x="647" y="281" text-anchor="middle" font-family="'Manrope',Arial,sans-serif" font-size="8px" font-weight="700" fill="#111111">biz</text>
  <!-- 48px -->
  <rect x="706" y="230" width="48" height="48" rx="7" fill="#111111"/>
  <text x="730" y="251" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-size="11px" font-weight="500" fill="#FFFFFF">noel</text>
  <text x="726" y="264" text-anchor="middle" font-family="'Fraunces',Georgia,serif" font-size="11px" font-weight="500" fill="#FFFFFF">ia</text><text x="734" y="264" font-family="Georgia,serif" font-size="11px" fill="#EDDF2D">.</text>
  <rect x="717" y="268" width="26" height="9" rx="2" fill="#EDDF2D"/>
  <text x="730" y="276" text-anchor="middle" font-family="'Manrope',Arial,sans-serif" font-size="5px" font-weight="700" fill="#111">biz</text>
  <text x="700" y="323" text-anchor="middle" class="lbl">Favicon — noel·IA·biz</text>

  <!-- =====================================================
       SPECS
       ===================================================== -->
  <line x1="40" y1="348" x2="880" y2="348" stroke="#e8e8e8" stroke-width="1"/>
  <text x="40" y="370" class="st" fill="#2132BD">Typography Specs — extracted from live site</text>
  <text x="40" y="390" class="rule">"noelia"  →  Fraunces · font-variation-settings: 'opsz' 24, 'wght' 500 · letter-spacing: -0.02em</text>
  <text x="40" y="408" class="rule">"."       →  Fraunces · same settings · color #2132BD (white/yellow bg) or #EDDF2D (dark/blue bg)</text>
  <text x="40" y="426" class="rule">"biz"     →  Manrope 700 · font-size 0.6em relative · background #EDDF2D · border-radius 4px · translateY(-2px)</text>

  <!-- =====================================================
       DO & DON'T
       ===================================================== -->
  <line x1="40" y1="450" x2="880" y2="450" stroke="#e8e8e8" stroke-width="1"/>
  <text x="40" y="472" class="st" fill="#2132BD">Logo Usage Rules</text>

  <text x="40" y="496" font-family="'Courier New',monospace" font-size="10px" fill="#2132BD" letter-spacing="0.1em">✓  USE</text>
  <text x="40" y="514" class="rule" fill="#333">Primary (on white) as default in all digital contexts.</text>
  <text x="40" y="530" class="rule" fill="#333">Yellow dot (#EDDF2D) on black or blue backgrounds.</text>
  <text x="40" y="546" class="rule" fill="#333">Blue dot (#2132BD) on white or yellow backgrounds.</text>
  <text x="40" y="562" class="rule" fill="#333">Yellow rect always behind "biz" — non-negotiable.</text>
  <text x="40" y="578" class="rule" fill="#333">Favicon: stacked noel / IA. / biz on black square.</text>
  <text x="40" y="594" class="rule" fill="#333">Minimum: 120px wide digital · 30mm wide print.</text>
  <text x="40" y="610" class="rule" fill="#333">Clear space: height of "n" on all four sides.</text>

  <text x="480" y="496" font-family="'Courier New',monospace" font-size="10px" fill="#111" letter-spacing="0.1em">✗  NEVER</text>
  <text x="480" y="514" class="rule" fill="#333">Change fonts — Fraunces wght 500 (noelia) + Manrope 700 (biz).</text>
  <text x="480" y="530" class="rule" fill="#333">Remove the yellow rectangle from "biz".</text>
  <text x="480" y="546" class="rule" fill="#333">Use dot in any color other than #2132BD or #EDDF2D.</text>
  <text x="480" y="562" class="rule" fill="#333">Stretch, rotate, skew, or distort the logo.</text>
  <text x="480" y="578" class="rule" fill="#333">Place on low-contrast or busy photographic backgrounds.</text>
  <text x="480" y="594" class="rule" fill="#333">Recreate with different weights or letter-spacing.</text>
  <text x="480" y="610" class="rule" fill="#333">Use blue dot on dark or blue backgrounds.</text>

  <!-- =====================================================
       COLOR TOKENS
       ===================================================== -->
  <line x1="40" y1="632" x2="880" y2="632" stroke="#e8e8e8" stroke-width="1"/>
  <text x="40" y="652" class="st" fill="#2132BD">Brand Color Tokens</text>
  <rect x="40" y="664" width="18" height="18" rx="3" fill="#111111"/>
  <text x="65" y="677" class="rule">Ink  #111111</text>
  <rect x="200" y="664" width="18" height="18" rx="3" fill="#2132BD"/>
  <text x="225" y="677" class="rule">Blue  #2132BD</text>
  <rect x="380" y="664" width="18" height="18" rx="3" fill="#EDDF2D" stroke="#e8e8e8" stroke-width="0.5"/>
  <text x="405" y="677" class="rule">Yellow  #EDDF2D</text>
  <rect x="570" y="664" width="18" height="18" rx="3" fill="#FFFFFF" stroke="#ccc" stroke-width="1"/>
  <text x="595" y="677" class="rule">White  #FFFFFF</text>

  <!-- NOTE -->
  <text x="40" y="706" font-family="'Courier New',monospace" font-size="10px" fill="#2132BD" letter-spacing="0.12em">★  noel·IA·biz — the letters IA live inside noelia in French and Spanish. Use favicon to surface it.</text>

</svg>
